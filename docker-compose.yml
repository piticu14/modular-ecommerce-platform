services:
  # ----------------------------
  # INFRA
  # ----------------------------
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
    networks:
      - ecommerce-network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks: [ecommerce-network]

  mysql-orders:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orders
      MYSQL_USER: orders
      MYSQL_PASSWORD: orders
    ports:
      - "3307:3306" # debug
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - mysql-orders-data:/var/lib/mysql
    networks: [ecommerce-network]

  mysql-products:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: products
      MYSQL_USER: products
      MYSQL_PASSWORD: products
    ports:
      - "3308:3306" # debug
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - mysql-products-data:/var/lib/mysql
    networks: [ecommerce-network]

  mysql-auth:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth
      MYSQL_USER: auth
      MYSQL_PASSWORD: auth
    ports:
      - "3309:3306" # debug
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - mysql-auth-data:/var/lib/mysql
    networks: [ecommerce-network]

  # ----------------------------
  # AUTH SERVICE (nginx + php-fpm)
  # ----------------------------
  auth-nginx:
    image: nginx:alpine
    volumes:
      - ./auth-service:/var/www/html
      - ./auth-service/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-php
    networks: [ ecommerce-network ]

  auth-php:
    build:
      context: ./auth-service
      args:
        APP_USER: ${UID}
        APP_GROUP: ${GID}
    user: "${UID}:${GID}"
    volumes:
      - ./auth-service:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: mysql-auth
      DB_DATABASE: auth
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: ecommerce.events
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    depends_on:
      - mysql-auth
      - redis
      - rabbitmq
    networks: [ ecommerce-network ]

  # ----------------------------
  # API GATEWAY (nginx + php-fpm)
  # ----------------------------
  api-nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./api-gateway:/var/www/html
      - ./api-gateway/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-php
    networks: [ecommerce-network]

  api-php:
    build:
      context:  ./api-gateway
    user: "${UID}:${GID}"
    volumes:
      - ./api-gateway:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      # service discovery (gateway volá služby přes nginx kontejnery)
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: ecommerce.events
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    depends_on:
      - redis
      - rabbitmq
      - order-nginx
      - product-nginx
      - auth-nginx
    networks: [ecommerce-network]

  # (volitelné) worker pro gateway, pokud bude mít joby
  api-worker:
    build:
      context: ./api-gateway
      args:
        APP_USER: ${UID}
        APP_GROUP: ${GID}
    user: "${UID}:${GID}"
    command: [
      "php",
      "artisan",
      "queue:work",
      "--tries=3",
      "--timeout=90"
    ]
    restart: unless-stopped
    volumes:
      - ./api-gateway:/var/www/html
    environment:
      APP_ENV: local
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: ecommerce.events
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    depends_on:
      - api-php
      - redis
      - rabbitmq
    networks: [ecommerce-network]
    profiles: [ "worker" ]

  # ----------------------------
  # ORDER SERVICE (nginx + php-fpm)
  # ----------------------------
  order-nginx:
    image: nginx:alpine
    volumes:
      - ./order-service:/var/www/html
      - ./order-service/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - order-php
    networks: [ecommerce-network]

  order-php:
    build:
      context: ./order-service
      args:
        APP_USER: ${UID}
        APP_GROUP: ${GID}
    user: "${UID}:${GID}"
    volumes:
      - ./order-service:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      RUN_MIGRATIONS: "true"
      DB_HOST: mysql-orders
      DB_DATABASE: orders
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: ecommerce.events
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    depends_on:
      - mysql-orders
      - redis
      - rabbitmq
    networks: [ecommerce-network]

  order-worker:
    build:
      context: ./order-service
      args:
        APP_USER: ${UID}
        APP_GROUP: ${GID}
    user: "${UID}:${GID}"
    command:
      [
        "php",
        "artisan",
        "queue:work",
        "rabbitmq",
        "--sleep=1",
        "--tries=1",
        "--timeout=90",
        "--max-jobs=1000"
      ]
    restart: unless-stopped
    volumes:
      - ./order-service:/var/www/html
    environment:
      APP_ENV: local
      RUN_MIGRATIONS: "false"
      DB_HOST: mysql-orders
      DB_DATABASE: orders
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: ecommerce.events
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    depends_on:
      - order-php
      - mysql-orders
      - redis
      - rabbitmq
    networks: [ecommerce-network]
    profiles: [ "worker" ]

  order-outbox-worker:
    build:
      context: ./order-service
      args:
        APP_USER: ${UID}
        APP_GROUP: ${GID}
    user: "${UID}:${GID}"
    command:
      [
        "sh",
        "/var/www/html/docker/wait-for.sh",
        "mysql-orders",
        "3306",
        "php",
        "artisan",
        "outbox:work"
      ]
    restart: on-failure
    volumes:
      - ./order-service:/var/www/html
    environment:
      APP_ENV: local
      RUN_MIGRATIONS: "false"
      DB_HOST: mysql-orders
      DB_DATABASE: orders
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: ecommerce.events
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    depends_on:
      - mysql-orders
      - rabbitmq
    networks: [ecommerce-network]
    profiles: [ "worker" ]

  # ----------------------------
  # PRODUCT SERVICE (nginx + php-fpm)
  # ----------------------------
  product-nginx:
    image: nginx:alpine
    volumes:
      - ./product-service:/var/www/html
      - ./product-service/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - product-php
    networks: [ecommerce-network]

  product-php:
    build:
      context: ./product-service
      args:
        APP_USER: ${UID}
        APP_GROUP: ${GID}
    user: "${UID}:${GID}"
    volumes:
      - ./product-service:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: mysql-products
      DB_DATABASE: products
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: ecommerce.events
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    depends_on:
      - mysql-products
      - redis
      - rabbitmq
    networks: [ecommerce-network]

  product-worker:
    build:
      context: ./product-service
      args:
        APP_USER: ${UID}
        APP_GROUP: ${GID}
    user: "${UID}:${GID}"
    command:
      [
        "php",
        "artisan",
        "queue:work",
        "rabbitmq",
        "--sleep=1",
        "--tries=1",
        "--timeout=90",
        "--max-jobs=1000"
      ]
    restart: unless-stopped
    volumes:
      - ./product-service:/var/www/html
    environment:
      APP_ENV: local
      DB_HOST: mysql-products
      DB_DATABASE: products
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: ecommerce.events
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    depends_on:
      - product-php
      - mysql-products
      - redis
      - rabbitmq
    networks: [ecommerce-network]
    profiles: [ "worker" ]

  product-outbox-worker:
    build:
      context: ./product-service
      args:
        APP_USER: ${UID}
        APP_GROUP: ${GID}
    user: "${UID}:${GID}"
    command:
      [
        "sh",
        "/var/www/html/docker/wait-for.sh",
        "mysql-products",
        "3306",
        "php",
        "artisan",
        "outbox:work"
      ]
    restart: on-failure
    environment:
      APP_ENV: local
      DB_HOST: mysql-products
      DB_DATABASE: products
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: ecommerce.events
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    volumes:
      - ./product-service:/var/www/html
    depends_on:
      - mysql-products
      - rabbitmq
    networks: [ecommerce-network]
    profiles: [ "worker" ]

  # ----------------------------
  # FRONTEND
  # ----------------------------
  frontend:
    build: ./frontend
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - api-nginx
#    profiles:
#      - frontend
    networks: [ecommerce-network]

networks:
  ecommerce-network:
    driver: bridge

volumes:
  mysql-orders-data:
  mysql-products-data:
  mysql-auth-data:
  rabbitmq_data:
services:
  # ----------------------------
  # INFRA
  # ----------------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks: [ecommerce-network]

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379" # klidně můžeš odstranit, je to jen pro debug
    networks: [ecommerce-network]

  mysql-orders:
    image: mysql:8
    container_name: mysql-orders
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orders
    ports:
      - "3307:3306" # debug
    volumes:
      - mysql-orders-data:/var/lib/mysql
    networks: [ecommerce-network]

  mysql-products:
    image: mysql:8
    container_name: mysql-products
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: products
    ports:
      - "3308:3306" # debug
    volumes:
      - mysql-products-data:/var/lib/mysql
    networks: [ecommerce-network]

  # ----------------------------
  # API GATEWAY (nginx + php-fpm)
  # ----------------------------
  api-nginx:
    image: nginx:alpine
    container_name: api-nginx
    ports:
      - "8000:80"
    volumes:
      - ./api-gateway:/var/www/html
      - ./api-gateway/.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-php
    networks: [ecommerce-network]

  api-php:
    build: ./api-gateway
    container_name: api-php
    volumes:
      - ./api-gateway:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000

      # service discovery (gateway volá služby přes nginx kontejnery)
      ORDER_SERVICE_URL: http://order-nginx
      PRODUCT_SERVICE_URL: http://product-nginx

      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: ecommerce.events
    depends_on:
      - redis
      - rabbitmq
      - order-nginx
      - product-nginx
    networks: [ecommerce-network]

  # (volitelné) worker pro gateway, pokud bude mít joby
  api-worker:
    build: ./api-gateway
    container_name: api-worker
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - ./api-gateway:/var/www/html
    environment:
      APP_ENV: local
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: ecommerce.events
    depends_on:
      - api-php
      - redis
      - rabbitmq
    networks: [ecommerce-network]

  # ----------------------------
  # ORDER SERVICE (nginx + php-fpm)
  # ----------------------------
  order-nginx:
    image: nginx:alpine
    container_name: order-nginx
    ports:
      - "8001:80" # debug z hosta
    volumes:
      - ./order-service:/var/www/html
      - ./order-service/.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - order-php
    networks: [ecommerce-network]

  order-php:
    build: ./order-service
    container_name: order-php
    volumes:
      - ./order-service:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"

      DB_HOST: mysql-orders
      DB_DATABASE: orders
      DB_USERNAME: root
      DB_PASSWORD: root

      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: ecommerce.events
    depends_on:
      - mysql-orders
      - redis
      - rabbitmq
    networks: [ecommerce-network]

  order-worker:
    build: ./order-service
    container_name: order-worker
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - ./order-service:/var/www/html
    environment:
      APP_ENV: local
      DB_HOST: mysql-orders
      DB_DATABASE: orders
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: ecommerce.events
    depends_on:
      - order-php
      - mysql-orders
      - redis
      - rabbitmq
    networks: [ecommerce-network]

  # ----------------------------
  # PRODUCT SERVICE (nginx + php-fpm)
  # ----------------------------
  product-nginx:
    image: nginx:alpine
    container_name: product-nginx
    ports:
      - "8002:80" # debug z hosta
    volumes:
      - ./product-service:/var/www/html
      - ./product-service/.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - product-php
    networks: [ecommerce-network]

  product-php:
    build: ./product-service
    container_name: product-php
    volumes:
      - ./product-service:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"

      DB_HOST: mysql-products
      DB_DATABASE: products
      DB_USERNAME: root
      DB_PASSWORD: root

      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: ecommerce.events
    depends_on:
      - mysql-products
      - redis
      - rabbitmq
    networks: [ecommerce-network]

  product-worker:
    build: ./product-service
    container_name: product-worker
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - ./product-service:/var/www/html
    environment:
      APP_ENV: local
      DB_HOST: mysql-products
      DB_DATABASE: products
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_EXCHANGE: ecommerce.events
    depends_on:
      - product-php
      - mysql-products
      - redis
      - rabbitmq
    networks: [ecommerce-network]

  # ----------------------------
  # FRONTEND
  # ----------------------------
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api-nginx
    networks: [ecommerce-network]

networks:
  ecommerce-network:
    driver: bridge

volumes:
  mysql-orders-data:
  mysql-products-data: